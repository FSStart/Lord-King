name: 自动部署到服务器

on:
  push:
    branches: [ main ]  # 当 main 分支有推送时触发
    paths-ignore:      # 可选：忽略某些文件变化（避免不必要的部署）
      - 'README.md'
      - '.gitignore'
      - 'docs/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 超时时间 10 分钟
    
    steps:
      - name: 连接服务器并拉取代码
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 进入项目目录（改成你的实际路径）
            cd /path/to/your/project/Lord-King
            
            # 显示当前目录（调试用）
            echo "当前目录: $(pwd)"
            
            # 拉取最新代码
            echo "正在拉取代码..."
            git pull origin main
            
            # 显示最后一条提交信息（确认更新成功）
            echo "最新提交:"
            git log -1 --oneline
            
            # 如果你的项目需要重启服务，在这里添加命令
            # 例如：
            # docker-compose down && docker-compose up -d
            # systemctl restart your-service
            # pm2 restart all
            
            echo "部署完成！"
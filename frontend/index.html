<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus AI · 二次元智能助手</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

body {
  background: #fdf4f0;
  color: #4a3f4d;
  overflow: hidden;
  height: 100vh;
}

/* ============ 桃花背景 ============ */
.bg-container {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #fde2e7 0%, #fed7c4 35%, #ffd5a8 70%, #ffbb8a 100%);
}

.bg-container::before,
.bg-container::after {
  content: '';
  position: absolute;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.6;
  animation: float 18s ease-in-out infinite;
}

.bg-container::before {
  background: radial-gradient(circle, #fbbac1 0%, transparent 70%);
  top: -200px;
  left: -200px;
}

.bg-container::after {
  background: radial-gradient(circle, #fcb78a 0%, transparent 70%);
  bottom: -200px;
  right: -200px;
  animation-delay: -9s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(80px, -40px) scale(1.1); }
  66% { transform: translate(-40px, 80px) scale(0.9); }
}

/* 飘动樱花 */
.sakura {
  position: absolute;
  width: 12px;
  height: 12px;
  background: radial-gradient(circle at 30% 30%, #ffb3c1, #ff8fa3);
  border-radius: 50% 0 50% 50%;
  opacity: 0.7;
  animation: sakuraFall linear infinite;
  pointer-events: none;
}

@keyframes sakuraFall {
  0% {
    transform: translateY(-100px) rotate(0deg);
    opacity: 0;
  }
  10% { opacity: 0.8; }
  90% { opacity: 0.6; }
  100% {
    transform: translateY(calc(100vh + 100px)) rotate(720deg);
    opacity: 0;
  }
}

/* ============ 主容器 ============ */
.container {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

/* ============ 顶部栏 ============ */
header {
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.6);
  padding: 14px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 12px rgba(251, 113, 133, 0.08);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, #ec4899, #f97316);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
}

.brand h1 {
  font-size: 16px;
  background: linear-gradient(135deg, #ec4899, #f97316);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}

.brand p {
  font-size: 11px;
  color: #9f7a85;
  margin-top: 2px;
}

.btn-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(255, 255, 255, 0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  color: #9f7a85;
  font-size: 18px;
  margin-left: 8px;
}

.btn-icon:hover {
  background: rgba(255, 255, 255, 0.9);
  color: #ec4899;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(236, 72, 153, 0.2);
}

.btn-icon.active {
  background: linear-gradient(135deg, #fce7f3, #ffedd5);
  border-color: rgba(236, 72, 153, 0.4);
  color: #ec4899;
}

/* ============ 主区域(三栏布局) ============ */
main {
  display: grid;
  grid-template-columns: 1fr 700px 1fr;
  padding: 24px;
  gap: 24px;
  overflow: hidden;
}

/* 中间聊天面板 */
.chat-panel {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(251, 113, 133, 0.12);
}

.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.5);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chat-title {
  font-size: 14px;
  font-weight: 600;
  color: #6b4f5c;
  display: flex;
  align-items: center;
  gap: 8px;
}

.chat-title::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #10b981;
  box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
}

.chat-status {
  font-size: 12px;
  color: #9f7a85;
}

/* 聊天消息区(可滚动,隐藏滚动条) */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: none;
}

.chat-messages::-webkit-scrollbar {
  width: 0;
}

.chat-messages:hover {
  scrollbar-width: thin;
}

.chat-messages:hover::-webkit-scrollbar {
  width: 6px;
}

.chat-messages:hover::-webkit-scrollbar-thumb {
  background: rgba(236, 72, 153, 0.3);
  border-radius: 3px;
}

/* 消息气泡 */
.message {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  max-width: 85%;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  margin-left: auto;
  flex-direction: row-reverse;
}

.message.ai .bubble {
  background: rgba(96, 165, 250, 0.15);
  border: 1px solid rgba(96, 165, 250, 0.3);
  color: #1e40af;
  font-size: 13px;
}

.message.user .bubble {
  background: linear-gradient(135deg, rgba(236, 72, 153, 0.25), rgba(249, 115, 22, 0.25));
  border: 1px solid rgba(236, 72, 153, 0.3);
  color: #831843;
  font-size: 14px;
}

.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}

.message.ai .bubble {
  border-top-left-radius: 4px;
}

.message.user .bubble {
  border-top-right-radius: 4px;
}

/* 输入区 */
.chat-input-area {
  padding: 14px 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.5);
  display: flex;
  gap: 8px;
  align-items: center;
}

.chat-input {
  flex: 1;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.8);
  color: #4a3f4d;
  padding: 10px 16px;
  border-radius: 22px;
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
}

.chat-input:focus {
  background: rgba(255, 255, 255, 0.95);
  border-color: rgba(236, 72, 153, 0.4);
  box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
}

.chat-input::placeholder {
  color: #c9a8b1;
}

.send-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #ec4899, #f97316);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
  box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
}

.send-btn:hover {
  transform: scale(1.1);
}

.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ============ 快捷按钮区 ============ */
.quick-bar {
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255, 255, 255, 0.6);
  padding: 14px 24px;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.quick-btn {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.8);
  color: #6b4f5c;
  padding: 8px 16px;
  border-radius: 18px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 500;
}

.quick-btn:hover {
  background: linear-gradient(135deg, rgba(252, 165, 165, 0.5), rgba(253, 186, 116, 0.5));
  color: #831843;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(236, 72, 153, 0.15);
}

/* ============ Live2D 角色区域 ============ */
.live2d-area {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 320px;
  height: 480px;
  z-index: 10;
  pointer-events: none;
}

#live2dCanvas {
  width: 100%;
  height: 100%;
  pointer-events: auto;
  cursor: pointer;
}

/* 角色对话气泡 */
.character-bubble {
  position: fixed;
  bottom: 380px;
  right: 280px;
  max-width: 220px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  color: #6b4f5c;
  padding: 12px 16px;
  border-radius: 18px 18px 4px 18px;
  font-size: 13px;
  line-height: 1.5;
  z-index: 11;
  box-shadow: 0 8px 24px rgba(251, 113, 133, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.8);
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s;
  pointer-events: none;
}

.character-bubble.show {
  opacity: 1;
  transform: translateY(0);
}

.character-bubble::before {
  content: '';
  position: absolute;
  bottom: -8px;
  right: 16px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid rgba(255, 255, 255, 0.95);
}

.character-name {
  font-size: 11px;
  color: #ec4899;
  font-weight: 600;
  margin-bottom: 4px;
}

/* ============ 主操作按钮(单一) ============ */
.main-action-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  transition: all 0.3s;
  background: linear-gradient(135deg, #ec4899, #f97316);
  color: white;
  z-index: 20;
  box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
}

.main-action-btn:hover {
  transform: scale(1.1) rotate(15deg);
}

.main-action-btn.recording {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  animation: pulse 1s ease-in-out infinite;
}

.main-action-btn.wake-mode {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
}

.main-action-btn.speaking {
  background: linear-gradient(135deg, #10b981, #059669);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); box-shadow: 0 4px 28px rgba(239, 68, 68, 0.6); }
}

.btn-tooltip {
  position: fixed;
  bottom: 92px;
  right: 24px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  color: #6b4f5c;
  padding: 8px 14px;
  border-radius: 12px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s;
  pointer-events: none;
  z-index: 21;
  box-shadow: 0 4px 12px rgba(251, 113, 133, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.8);
}

.btn-tooltip.show {
  opacity: 1;
  transform: translateY(0);
}

/* ============ 底部状态栏 ============ */
footer {
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255, 255, 255, 0.5);
  padding: 8px 24px;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #9f7a85;
}

.dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #fbbf24;
  margin-right: 6px;
}

.dot.connected { background: #10b981; }
.dot.disconnected { background: #ef4444; }

/* ============ 设置面板 ============ */
.settings-panel {
  position: fixed;
  top: 0;
  right: -380px;
  width: 360px;
  height: 100vh;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(255, 255, 255, 0.6);
  transition: right 0.3s;
  z-index: 50;
  overflow-y: auto;
  padding: 24px;
  box-shadow: -8px 0 32px rgba(251, 113, 133, 0.15);
}

.settings-panel.open { right: 0; }

.settings-panel h2 {
  font-size: 18px;
  color: #6b4f5c;
  margin-bottom: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 13px;
  color: #6b4f5c;
  margin-bottom: 8px;
  font-weight: 500;
}

.form-group input[type="text"],
.form-group select {
  width: 100%;
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(236, 72, 153, 0.2);
  color: #4a3f4d;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
  outline: none;
}

.form-group input[type="text"]:focus,
.form-group select:focus {
  border-color: rgba(236, 72, 153, 0.5);
}

.form-group .hint {
  font-size: 11px;
  color: #b89aa3;
  margin-top: 4px;
}

.checkbox-group {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  font-size: 14px;
  color: #6b4f5c;
}

input[type="range"] {
  width: 100%;
  accent-color: #ec4899;
}

input[type="checkbox"] {
  width: 20px;
  height: 20px;
  accent-color: #ec4899;
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(236, 72, 153, 0.3);
  color: #831843;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(251, 113, 133, 0.2);
}

.toast.show { opacity: 1; }

/* 加载占位(Live2D 未加载时显示) */
.live2d-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  color: #9f7a85;
  font-size: 13px;
  text-align: center;
  padding: 20px;
}

.live2d-placeholder .emoji {
  font-size: 80px;
  margin-bottom: 12px;
  animation: bounce 2s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* 响应式 */
@media (max-width: 1100px) {
  main {
    grid-template-columns: 1fr;
  }
  .live2d-area {
    width: 240px;
    height: 360px;
  }
  .character-bubble {
    right: 220px;
    bottom: 300px;
  }
}
</style>
</head>
<body>

<div class="bg-container" id="bgContainer"></div>

<div class="container">

  <!-- 顶部 -->
  <header>
    <div class="logo-area">
      <div class="logo">🌸</div>
      <div class="brand">
        <h1>Nexus AI</h1>
        <p id="statusText">初始化中...</p>
      </div>
    </div>
    <div style="display:flex;">
      <button class="btn-icon" onclick="toggleSettings()" title="设置">⚙️</button>
    </div>
  </header>

  <!-- 主区 -->
  <main>
    <div></div>

    <div class="chat-panel">
      <div class="chat-header">
        <div class="chat-title">对话记录</div>
        <div class="chat-status" id="chatStatus">就绪</div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="message ai">
          <div class="bubble">你好呀!我是 Nexus,你的二次元助手 ✨ 你可以打字也可以语音和我聊天哦~</div>
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput"
               placeholder="说点什么..." onkeydown="handleInputKey(event)">
        <button class="send-btn" id="sendBtn" onclick="sendText()">→</button>
      </div>
    </div>

    <div></div>
  </main>

  <!-- 底部快捷按钮 -->
  <div class="quick-bar">
    <button class="quick-btn" onclick="quickSay('你好,介绍下自己')">👋 打招呼</button>
    <button class="quick-btn" onclick="quickSay('今天天气怎么样?')">🌤️ 查天气</button>
    <button class="quick-btn" onclick="quickSay('帮我规划明天的工作')">📋 做规划</button>
    <button class="quick-btn" onclick="quickSay('讲一个笑话')">😂 讲笑话</button>
    <button class="quick-btn" onclick="quickSay('Hello, who are you?')">🌐 英文测试</button>
  </div>

  <footer>
    <div>
      <span class="dot" id="connDot"></span>
      <span id="connText">连接中</span>
      <span style="margin-left:16px;" id="wakeStatus">点击🌸说话 · 长按开启唤醒</span>
    </div>
    <div id="userIdShort"></div>
  </footer>

</div>

<div class="live2d-area" id="live2dArea">
  <canvas id="live2dCanvas"></canvas>
  <div class="live2d-placeholder" id="live2dPlaceholder">
    <div class="emoji">🌸</div>
    <div>正在加载角色...</div>
    <div style="font-size:11px;margin-top:6px;color:#c9a8b1">如果一直加载失败,可点击重试</div>
    <button class="quick-btn" style="margin-top:12px;font-size:12px;" onclick="currentModelIdx=0; initLive2D()">🔄 重新加载</button>
  </div>
</div>

<!-- 角色对话气泡 -->
<div class="character-bubble" id="characterBubble">
  <div class="character-name">Hiyori</div>
  <div id="characterText">点击下方花花开始对话</div>
</div>

<!-- 单一主操作按钮 -->
<button class="main-action-btn" id="mainActionBtn"
        onclick="handleMainAction()"
        oncontextmenu="event.preventDefault(); toggleWakeMode(); return false;">
  🌸
</button>

<div class="btn-tooltip" id="btnTooltip"></div>

<!-- 设置面板 -->
<div class="settings-panel" id="settingsPanel">
  <h2>
    设置
    <button class="btn-icon" onclick="toggleSettings()">✕</button>
  </h2>

  <div class="form-group">
    <label>唤醒词</label>
    <input id="wakeWord" type="text" value="lordking">
    <p class="hint">支持: lordking / lord king / 老大 / 国王陛下</p>
  </div>

  <div class="form-group">
    <label>识别语言</label>
    <select id="recogLang">
      <option value="zh-CN">中文(普通话)</option>
      <option value="en-US">English (US)</option>
    </select>
  </div>

  <div class="form-group">
    <label>语音引擎</label>
    <select id="ttsEngine">
      <option value="edge">Edge TTS · 自然女声(推荐)</option>
      <option value="browser">浏览器自带</option>
    </select>
  </div>

  <div class="form-group">
    <label>Edge TTS 声音</label>
    <select id="edgeVoice">
      <option value="zh-CN-XiaoxiaoNeural">晓晓 · 温柔甜美</option>
      <option value="zh-CN-XiaoyiNeural">晓伊 · 活泼可爱</option>
      <option value="zh-CN-YunxiNeural">云希 · 阳光男生</option>
      <option value="zh-CN-XiaomengNeural">晓梦 · 知性优雅</option>
      <option value="zh-CN-XiaohanNeural">晓涵 · 温暖姐姐</option>
    </select>
  </div>

  <div class="form-group">
    <label>语速 <span id="speedVal" style="color:#9f7a85">1.0x</span></label>
    <input id="ttsSpeed" type="range" min="0.5" max="2" step="0.1" value="1"
           oninput="document.getElementById('speedVal').textContent = this.value + 'x'">
  </div>

  <div class="checkbox-group">
    <span>自动播报回复</span>
    <input id="autoSpeak" type="checkbox" checked>
  </div>

  <button class="quick-btn" style="width:100%;margin-top:16px;" onclick="testVoice()">🔊 测试语音</button>

<script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>

<script>
// ============ 配置 ============
const API = window.location.protocol + '//' + window.location.host;
const WS_URL = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host;

let userId = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 9);
localStorage.setItem('userId', userId);
document.getElementById('userIdShort').textContent = userId.slice(0, 12);

// 状态
const STATES = {
  IDLE: 'idle',
  WAKE_LISTENING: 'wake-listening',
  LISTENING: 'listening',
  THINKING: 'thinking',
  SPEAKING: 'speaking'
};
let currentState = STATES.IDLE;

let ws = null;
let recognition = null;
let wakeRecognition = null;
let synth = window.speechSynthesis;
let voices = [];
let wakeWordEnabled = false;
let isProcessing = false;
let currentUtterance = null;
let aiResponseBuffer = '';
let live2dModel = null;
let pixiApp = null;
let currentAudio = null;

// ============ 樱花效果 ============
function createSakura() {
  const bg = document.getElementById('bgContainer');
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');

createSakura();

// ============ Live2D 初始化(多个备选源) ============
// 这些都是 Cubism 2 格式的模型(.model.json),JK 风格,确认可用
const LIVE2D_MODELS = [
  // 模型 1: Hiyori - JK 风蓝发女孩(主推荐)
  'https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/hiyori/model.json',
  // 模型 2: Sagiri - 银发萝莉
  'https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/sagiri/model.json',
  // 模型 3: Miku - 初音未来
  'https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/miku/model.json',
  // 模型 4: Koharu - 兔耳女孩
  'https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/koharu/model.json',
];

let currentModelIdx = 0;

// 确保 Cubism Core 加载完成
function waitForCubism() {
  return new Promise((resolve) => {
    if (window.Live2DCubismCore) {
      resolve();
      return;
    }
    const check = setInterval(() => {
      if (window.Live2DCubismCore) {
        clearInterval(check);
        resolve();
      }
    }, 100);
    // 最多等 10 秒
    setTimeout(() => { clearInterval(check); resolve(); }, 10000);
  });
}

async function initLive2D() {
  // 显示加载提示
  document.getElementById('live2dPlaceholder').innerHTML = `
    <div class="emoji">🌸</div>
    <div>正在加载角色...</div>
    <div style="font-size:11px;margin-top:6px;color:#c9a8b1">连接中,请稍候</div>
  `;
  document.getElementById('live2dPlaceholder').style.display = 'flex';

  // 等待 Cubism Core 加载
  await waitForCubism();

  if (!window.Live2DCubismCore) {
    document.getElementById('live2dPlaceholder').innerHTML = `
      <div class="emoji">😢</div>
      <div>Cubism Core 加载失败</div>
      <div style="font-size:11px;margin-top:6px;color:#c9a8b1">CDN 网络问题</div>
      <button class="quick-btn" style="margin-top:12px;font-size:12px;" onclick="location.reload()">🔄 刷新页面</button>
    `;
    return;
  }

  // 清理旧资源
  if (pixiApp) {
    try { pixiApp.destroy(true, true); } catch(e) {}
    pixiApp = null;
    live2dModel = null;
  }

  for (let i = currentModelIdx; i < LIVE2D_MODELS.length; i++) {
    const modelUrl = LIVE2D_MODELS[i];
    console.log(`尝试加载模型 ${i + 1}/${LIVE2D_MODELS.length}: ${modelUrl}`);

    // 每次重新获取 canvas
    let canvas = document.getElementById('live2dCanvas');
    if (!canvas) {
      console.error('canvas 元素丢失,重建中...');
      const area = document.getElementById('live2dArea');
      canvas = document.createElement('canvas');
      canvas.id = 'live2dCanvas';
      area.insertBefore(canvas, area.firstChild);
    }

    try {
      // 重新获取 rect(每次创建新 canvas 后必须重新获取)
      const rect = canvas.getBoundingClientRect();

      if (rect.width === 0 || rect.height === 0) {
        console.warn('canvas 尺寸为 0,跳过');
        continue;
      }

      pixiApp = new PIXI.Application({
        view: canvas,
        autoStart: true,
        transparent: true,
        backgroundAlpha: 0,
        resolution: window.devicePixelRatio || 1,
        antialias: true,
        width: rect.width,
        height: rect.height
      });

      const Live2DModel = PIXI.live2d.Live2DModel;
      const modelPromise = Live2DModel.from(modelUrl, { autoInteract: true });
      const timeoutPromise = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('加载超时')), 20000)
      );

      live2dModel = await Promise.race([modelPromise, timeoutPromise]);

      pixiApp.stage.addChild(live2dModel);

      const scale = Math.min(rect.width / live2dModel.width, rect.height / live2dModel.height) * 0.9;
      live2dModel.scale.set(scale);
      live2dModel.x = rect.width / 2 - live2dModel.width / 2;
      live2dModel.y = rect.height - live2dModel.height;

      document.getElementById('live2dPlaceholder').style.display = 'none';

      live2dModel.on('pointerdown', () => {
        const greetings = ['嗨!','你好呀!','找我有事吗?','在的!','摸我做什么呀~'];
        showCharacterText(greetings[Math.floor(Math.random() * greetings.length)]);
      });

      console.log('✓ Live2D 加载成功!');
      showCharacterText('你好呀,我来啦~ ✨');
      currentModelIdx = i;
      return;

    } catch (e) {
      console.warn(`模型 ${i + 1} 加载失败:`, e.message);
      if (pixiApp) {
        try { pixiApp.destroy(true, false); } catch(err) {}
        pixiApp = null;
      }
      live2dModel = null;
    }
  }

  // 所有模型都失败
  document.getElementById('live2dPlaceholder').innerHTML = `
    <div class="emoji">🌸</div>
    <div>Live2D 模型加载失败</div>
    <div style="font-size:11px;margin-top:6px;color:#c9a8b1">所有 CDN 都无法访问</div>
    <button class="quick-btn" style="margin-top:12px;font-size:12px;" onclick="currentModelIdx=0; initLive2D()">🔄 重新加载</button>
  `;
}

// Live2D 动作触发
function triggerMotion(group) {
  if (!live2dModel) return;
  try {
    live2dModel.motion(group);
  } catch (e) {}
}

// 显示角色对话气泡
function showCharacterText(text, duration = 4000) {
  const bubble = document.getElementById('characterBubble');
  document.getElementById('characterText').textContent = text;
  bubble.classList.add('show');
  clearTimeout(bubble._hideTimer);
  bubble._hideTimer = setTimeout(() => {
    bubble.classList.remove('show');
  }, duration);
}

// ============ 设置加载 ============
function loadSettings() {
  const saved = JSON.parse(localStorage.getItem('settings') || '{}');
  if (saved.wakeWord) document.getElementById('wakeWord').value = saved.wakeWord;
  if (saved.recogLang) document.getElementById('recogLang').value = saved.recogLang;
  if (saved.ttsEngine) document.getElementById('ttsEngine').value = saved.ttsEngine;
  if (saved.edgeVoice) document.getElementById('edgeVoice').value = saved.edgeVoice;
  if (saved.ttsSpeed) {
    document.getElementById('ttsSpeed').value = saved.ttsSpeed;
    document.getElementById('speedVal').textContent = saved.ttsSpeed + 'x';
  }
  if (saved.autoSpeak !== undefined) document.getElementById('autoSpeak').checked = saved.autoSpeak;
}

function saveSettings() {
  localStorage.setItem('settings', JSON.stringify({
    wakeWord: document.getElementById('wakeWord').value,
    recogLang: document.getElementById('recogLang').value,
    ttsEngine: document.getElementById('ttsEngine').value,
    edgeVoice: document.getElementById('edgeVoice').value,
    ttsSpeed: document.getElementById('ttsSpeed').value,
    autoSpeak: document.getElementById('autoSpeak').checked
  }));
}

['wakeWord', 'recogLang', 'ttsEngine', 'edgeVoice', 'ttsSpeed', 'autoSpeak'].forEach(id => {
  document.getElementById(id).addEventListener('change', saveSettings);
});

function loadVoices() {
  voices = synth.getVoices();
}

if (synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = loadVoices;
}

// ============ WebSocket ============
function connectWS() {
  ws = new WebSocket(`${WS_URL}/ws/${userId}`);

  ws.onopen = () => {
    document.getElementById('connDot').className = 'dot connected';
    document.getElementById('connText').textContent = '已连接';
    setStatus('就绪');
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleWSMessage(data);
  };

  ws.onclose = () => {
    document.getElementById('connDot').className = 'dot disconnected';
    document.getElementById('connText').textContent = '断开';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = (e) => console.error('WebSocket error:', e);
}

function handleWSMessage(data) {
  if (data.type === 'status' && data.status === 'thinking') {
    setState(STATES.THINKING);
    setStatus('思考中...');
    triggerMotion('idle');
  } else if (data.type === 'chunk') {
    aiResponseBuffer += data.content;
    updateLastAIMessage(aiResponseBuffer);
  } else if (data.type === 'done') {
    const fullResponse = data.full_response || aiResponseBuffer;
    if (!aiResponseBuffer) {
      addMessage('ai', fullResponse);
    }
    if (document.getElementById('autoSpeak').checked) {
      speak(fullResponse);
      showCharacterText(fullResponse.length > 50 ? fullResponse.slice(0, 50) + '...' : fullResponse);
    } else {
      setState(STATES.IDLE);
      isProcessing = false;
    }
    aiResponseBuffer = '';
  } else if (data.type === 'error') {
    addMessage('ai', '出错了: ' + (data.error || '未知错误'));
    setState(STATES.IDLE);
    isProcessing = false;
    aiResponseBuffer = '';
  }
}

// ============ 主按钮统一操作 ============
function handleMainAction() {
  if (currentState === STATES.SPEAKING) { stopSpeaking(); return; }
  if (currentState === STATES.LISTENING) { stopListening(); return; }
  if (isProcessing) return;
  startListening();
}

// 长按检测(切换唤醒词)
let pressStartTime = 0;
function setupMainBtn() {
  const mainBtn = document.getElementById('mainActionBtn');

  mainBtn.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    pressStartTime = Date.now();
    pressTimer = setTimeout(() => {
      toggleWakeMode();
      pressStartTime = 0;
    }, 800);
  });

  mainBtn.addEventListener('mouseup', () => { clearTimeout(pressTimer); });
  mainBtn.addEventListener('mouseleave', () => { clearTimeout(pressTimer); });

  mainBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    pressStartTime = Date.now();
    pressTimer = setTimeout(() => {
      toggleWakeMode();
      pressStartTime = 0;
    }, 800);
  });

  mainBtn.addEventListener('touchend', (e) => {
    clearTimeout(pressTimer);
    if (Date.now() - pressStartTime < 800 && pressStartTime > 0) {
      handleMainAction();
    }
  });

  mainBtn.addEventListener('mouseenter', () => {
    showTooltip('单击说话 · 长按/右键切换唤醒词');
  });

  mainBtn.addEventListener('mouseleave', () => { hideTooltip(); });
}

function showTooltip(text) {
  const tip = document.getElementById('btnTooltip');
  tip.textContent = text;
  tip.classList.add('show');
}

function hideTooltip() {
  document.getElementById('btnTooltip').classList.remove('show');
}

// 更新主按钮外观
function updateMainBtnAppearance() {
  const btn = document.getElementById('mainActionBtn');
  btn.classList.remove('recording', 'wake-mode', 'speaking');

  if (currentState === STATES.LISTENING) {
    btn.classList.add('recording');
    btn.textContent = '🎤';
  } else if (currentState === STATES.SPEAKING) {
    btn.classList.add('speaking');
    btn.textContent = '🔊';
  } else if (currentState === STATES.THINKING) {
    btn.textContent = '💭';
  } else if (wakeWordEnabled) {
    btn.classList.add('wake-mode');
    btn.textContent = '✨';
  } else {
    btn.textContent = '🌸';
  }
}

// ============ 状态管理 ============
function setState(state) {
  currentState = state;
  updateMainBtnAppearance();

  const statusMap = {
    [STATES.IDLE]: wakeWordEnabled ? '监听唤醒词中' : '就绪',
    [STATES.WAKE_LISTENING]: '监听唤醒词...',
    [STATES.LISTENING]: '正在听...',
    [STATES.THINKING]: '思考中...',
    [STATES.SPEAKING]: '播报中...'
  };
  document.getElementById('chatStatus').textContent = statusMap[state];
  document.getElementById('statusText').textContent = statusMap[state];
}

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

// ============ 消息管理 ============
function addMessage(type, content) {
  const messages = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = 'message ' + type;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;

  msg.appendChild(bubble);
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

function updateLastAIMessage(content) {
  const messages = document.getElementById('chatMessages');
  let lastAI = messages.querySelector('.message.ai:last-child');

  if (!lastAI || lastAI.dataset.streaming !== 'true') {
    const msg = document.createElement('div');
    msg.className = 'message ai';
    msg.dataset.streaming = 'true';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    msg.appendChild(bubble);
    messages.appendChild(msg);
    lastAI = msg;
  }

  lastAI.querySelector('.bubble').textContent = content;
  messages.scrollTop = messages.scrollHeight;

  // 流式结束后取消标记
  clearTimeout(lastAI._endTimer);
  lastAI._endTimer = setTimeout(() => {
    delete lastAI.dataset.streaming;
  }, 500);
}

// ============ 文字输入 ============
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
}

function sendText() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || isProcessing) return;
  input.value = '';
  sendToAI(text);
}

function quickSay(text) {
  if (isProcessing) return;
  sendToAI(text);
}

// ============ 麦克风检测 ============
function checkBrowserSupport() {
  const hasRecognition = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
  const isSecure = window.location.protocol === 'https:' ||
                   window.location.hostname === 'localhost' ||
                   window.location.hostname === '127.0.0.1';

  if (!hasRecognition) {
    showToast('⚠️ 浏览器不支持语音,请用 Chrome/Edge');
    return false;
  }
  if (!isSecure) {
    showToast('⚠️ 语音功能需要 HTTPS 或 localhost');
    return false;
  }
  return true;
}

function startListening() {
  if (!checkBrowserSupport() || isProcessing) return;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = document.getElementById('recogLang').value;

  let finalTranscript = '';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalTranscript += t;
      else interim += t;
    }
    setStatus('听到: ' + (finalTranscript + interim));
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') showToast('没听清,请再说一次');
    setState(STATES.IDLE);
    isProcessing = false;
    if (wakeWordEnabled) setTimeout(startWakeListening, 1000);
  };

  recognition.onend = () => {
    if (finalTranscript.trim()) {
      sendToAI(finalTranscript.trim());
    } else {
      setState(STATES.IDLE);
      if (wakeWordEnabled) setTimeout(startWakeListening, 500);
    }
  };

  try {
    recognition.start();
    setState(STATES.LISTENING);
    setStatus('请说话...');
    showCharacterText('我在听呢~');
  } catch (e) {
    showToast('启动语音识别失败');
  }
}

function stopListening() {
  if (recognition) try { recognition.stop(); } catch (e) {}
}

// ============ 唤醒词 ============
function toggleWakeMode() {
  wakeWordEnabled = !wakeWordEnabled;

  if (wakeWordEnabled) {
    document.getElementById('wakeStatus').textContent = '唤醒词:开启 · 说 "LordKing"';
    startWakeListening();
    showToast('✓ 唤醒词已开启');
    showCharacterText('在听你呼唤呢~ 说 "LordKing" 唤醒我吧');
  } else {
    document.getElementById('wakeStatus').textContent = '点击🌸说话 · 长按开启唤醒';
    stopWakeListening();
    setState(STATES.IDLE);
    showToast('唤醒词已关闭');
  }
  updateMainBtnAppearance();
}

function startWakeListening() {
  if (!checkBrowserSupport()) return;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  wakeRecognition = new SR();
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = true;
  wakeRecognition.lang = 'zh-CN';

  const wakeWord = document.getElementById('wakeWord').value.toLowerCase().trim();
  const aliases = [
    wakeWord, 'lordking', 'lord king', 'lord-king',
    '老大', '国王', '陛下', '罗德金', '洛德金',
    'hey lord', 'hi lord'
  ];

  wakeRecognition.onresult = (event) => {
    const result = event.results[event.results.length - 1];
    const transcript = result[0].transcript.toLowerCase().trim();
    if (aliases.some(a => transcript.includes(a)) && !isProcessing) {
      stopWakeListening();
      playBeep();
      showToast('✨ 已唤醒,请说话');
      showCharacterText('诶? 主人叫我吗?');
      setTimeout(startListening, 300);
    }
  };

  wakeRecognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'audio-capture') {
      setTimeout(() => { if (wakeWordEnabled) startWakeListening(); }, 1000);
    }
  };

  wakeRecognition.onend = () => {
    if (wakeWordEnabled && currentState === STATES.WAKE_LISTENING) {
      setTimeout(() => { if (wakeWordEnabled) startWakeListening(); }, 100);
    }
  };

  try {
    wakeRecognition.start();
    setState(STATES.WAKE_LISTENING);
  } catch (e) {
    console.error(e);
  }
}

function stopWakeListening() {
  if (wakeRecognition) try { wakeRecognition.stop(); } catch (e) {}
}

// ============ 发送到 AI ============
function sendToAI(text) {
  if (!text) return;
  isProcessing = true;
  addMessage('user', text);

  setTimeout(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        message: text,
        user_id: userId
      }));
    } else {
      addMessage('ai', '连接已断开,请稍候...');
      isProcessing = false;
      setState(STATES.IDLE);
    }
  }, 300);
}

// ============ TTS 语音 ============
async function speak(text) {
  if (!text) {
    setState(STATES.IDLE);
    isProcessing = false;
    return;
  }

  const cleanText = text
    .replace(/[*_`#]/g, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/\n+/g, '。');

  const engine = document.getElementById('ttsEngine').value;

  if (engine === 'edge') {
    await speakEdge(cleanText);
  } else {
    speakBrowser(cleanText);
  }
}

async function speakEdge(text) {
  try {
    setState(STATES.SPEAKING);

    const voice = document.getElementById('edgeVoice').value;
    const speed = parseFloat(document.getElementById('ttsSpeed').value);
    const rate = ((speed - 1) * 100).toFixed(0) + '%';

    const response = await fetch(`${API}/tts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice, rate: rate.startsWith('-') ? rate : '+' + rate })
    });

    if (!response.ok) throw new Error('TTS 服务异常');

    const blob = await response.blob();
    const audioUrl = URL.createObjectURL(blob);

    currentAudio = new Audio(audioUrl);

    currentAudio.onended = () => {
      setState(STATES.IDLE);
      isProcessing = false;
      currentAudio = null;
      if (wakeWordEnabled) setTimeout(startWakeListening, 500);
    };

    currentAudio.onerror = () => {
      console.error('音频播放失败,降级到浏览器 TTS');
      speakBrowser(text);
    };

    await currentAudio.play();

  } catch (e) {
    console.error('Edge TTS 失败:', e);
    showToast('Edge TTS 失败,使用浏览器声音');
    speakBrowser(text);
  }
}

function speakBrowser(text) {
  setState(STATES.SPEAKING);
  const isEnglish = /^[\x00-\x7F\s]+$/.test(text.replace(/[。,!?]/g, ''));

  currentUtterance = new SpeechSynthesisUtterance(text);
  currentUtterance.rate = parseFloat(document.getElementById('ttsSpeed').value);

  const lang = isEnglish ? 'en' : 'zh';
  const v = voices.find(x => x.lang.startsWith(lang));
  if (v) currentUtterance.voice = v;

  currentUtterance.onend = () => {
    setState(STATES.IDLE);
    isProcessing = false;
    currentUtterance = null;
    if (wakeWordEnabled) setTimeout(startWakeListening, 500);
  };

  currentUtterance.onerror = () => {
    setState(STATES.IDLE);
    isProcessing = false;
    if (wakeWordEnabled) setTimeout(startWakeListening, 500);
  };

  synth.speak(currentUtterance);
}

function stopSpeaking() {
  if (synth) synth.cancel();
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  setState(STATES.IDLE);
  isProcessing = false;
  if (wakeWordEnabled) setTimeout(startWakeListening, 300);
}

function testVoice() {
  speak('你好,我是 Hiyori,你的二次元语音助手。Hello, this is a voice test.');
}

// ============ 提示音 ============
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
  } catch (e) {}
}

// ============ 设置面板 ============
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

async function clearAll() {
  if (!confirm('清空所有对话记录?')) return;
  try {
    await fetch(`${API}/history/${userId}`, { method: 'DELETE' });
    document.getElementById('chatMessages').innerHTML = `
      <div class="message ai">
        <div class="bubble">记录已清空 ✨ 重新开始聊天吧~</div>
      </div>
    `;
    showToast('✓ 已清空');
  } catch (e) {
    showToast('清空失败');
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// 空格键说话
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat &&
      document.activeElement.tagName !== 'INPUT' &&
      document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    if (!isProcessing && currentState !== STATES.LISTENING) startListening();
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' && currentState === STATES.LISTENING) stopListening();
});

window.addEventListener('beforeunload', () => {
  if (currentUtterance) synth.cancel();
  if (currentAudio) currentAudio.pause();
  if (recognition) recognition.stop();
  if (wakeRecognition) wakeRecognition.stop();
});

// ============ 初始化 ============
loadSettings();
loadVoices();
connectWS();
setupMainBtn();
setTimeout(initLive2D, 500);
</script>

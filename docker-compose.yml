services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MyNexus2026}
      POSTGRES_DB: ai_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-net
    deploy:
      resources:
        limits:
          memory: 300M

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - ai-net
    deploy:
      resources:
        limits:
          memory: 250M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_user:${POSTGRES_PASSWORD:-MyNexus2026}@postgres:5432/ai_assistant
      REDIS_URL: redis://redis:6379
      MILVUS_DB_PATH: /app/data/milvus_lite.db
    volumes:
      - milvus_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ai-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - ai-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 100M

volumes:
  postgres_data:
  redis_data:
  milvus_data:

networks:
  ai-net:
    driver: bridge
